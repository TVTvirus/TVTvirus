name: update profile card

on:
  schedule:
    - cron: "17 * * * *"        # cada hora
  workflow_dispatch:             # boton manual en la pestana Actions

permissions:
  contents: write

concurrency:
  group: update-card
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Recoger datos y regenerar SVGs
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python update_data.py
          python make_profile.py

      - name: Commit si hay cambios (amend para no inflar el historial)
        run: |
          if git diff --quiet; then
            echo "sin cambios"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json dark_mode.svg light_mode.svg
          if git log -1 --pretty=%s | grep -q "^chore: update card data"; then
            git commit --amend -m "chore: update card data"
            git push --force-with-lease
          else
            git commit -m "chore: update card data"
            git push
          fi
